services:
  - type: web
    name: giradi-backend
    runtime: node
    rootDir: .
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --omit=dev --no-audit --no-fund && cp -r .medusa/server/public public && rm -rf src && mkdir -p src/modules/paypal && cp .medusa/server/src/modules/paypal/*.js src/modules/paypal/
    startCommand: npm run start -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: NPM_CONFIG_PRODUCTION
        value: "true"
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: EVENTS_REDIS_URL
        sync: false
      - key: STORE_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: SUPABASE_S3_ACCESS_KEY
        sync: false
      - key: SUPABASE_S3_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false